[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd 01-Code/backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.environmentVariables]]
name = "CORS_ORIGINS"
value = "https://resume2interview-staging.vercel.app,http://localhost:5173"

[[deploy.environmentVariables]]
name = "ANALYTICS_PASSWORD"
value = "admin123"

# Note: DATABASE_URL and OPENAI_API_KEY should be set in Railway dashboard
# These contain sensitive credentials and should NOT be in Git
# Railway will automatically inject DATABASE_URL from the connected PostgreSQL service
